name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            build: build:win
            glob: '*.exe*'
          - os: macos-latest
            build: build:mac:arm64
            glob: '*.dmg*'

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci --legacy-peer-deps

      - run: npm run ${{ matrix.build }}

      - uses: actions/upload-artifact@v4
        with:
          name: installer-${{ runner.os }}
          path: dist/${{ matrix.glob }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - run: ls -la

      - name: Create or update release
        run: |
          if gh release view "${{ github.ref_name }}" --json tagName > /dev/null 2>&1; then
            gh release upload "${{ github.ref_name }}" *.* --clobber || true
          else
            gh release create "${{ github.ref_name }}" *.* \
              --title "${{ github.ref_name }}" \
              --notes "Автоматическая сборка" || true
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

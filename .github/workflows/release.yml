name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            build: build:ci:win
            glob: '*.exe*'
          - os: macos-latest
            build: build:ci:mac:arm64
            glob: '*.dmg*'

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci --legacy-peer-deps

      - run: npm run ${{ matrix.build }}

      - uses: actions/upload-artifact@v4
        with:
          name: installer-${{ runner.os }}
          path: dist/${{ matrix.glob }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - run: ls -la

      - name: Create or update release
        run: |
          NOTES=$(cat RELEASE_NOTES.md 2>/dev/null || echo "Автоматическая сборка")
          if gh release view "${{ github.ref_name }}" --json tagName > /dev/null 2>&1; then
            gh release delete-asset "${{ github.ref_name }}" "RodjerCloud-*.exe" --yes 2>/dev/null || true
            gh release delete-asset "${{ github.ref_name }}" "RodjerCloud-*.exe.blockmap" --yes 2>/dev/null || true
            gh release delete-asset "${{ github.ref_name }}" "RodjerCloud-*.dmg" --yes 2>/dev/null || true
            gh release delete-asset "${{ github.ref_name }}" "RodjerCloud-*.dmg.blockmap" --yes 2>/dev/null || true
            gh release upload "${{ github.ref_name }}" *.exe *.exe.blockmap *.dmg *.dmg.blockmap --clobber || true
            gh release edit "${{ github.ref_name }}" --notes "$NOTES" || true
          else
            gh release create "${{ github.ref_name }}" *.exe *.exe.blockmap *.dmg *.dmg.blockmap \
              --title "${{ github.ref_name }}" \
              --notes "$NOTES" || true
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    strategy:
      matrix:
        include:
          - os: windows-latest
          - os: macos-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

      - run: npm ci --legacy-peer-deps

      - name: Build and Publish (Windows)
        if: matrix.os == 'windows-latest'
        run: npm run build:win -- -p always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate .icns (Mac)
        if: startsWith(matrix.os, 'macos')
        run: bash scripts/generate-icons.sh

      - name: Build and Publish (Mac arm64)
        if: matrix.os == 'macos-latest'
        run: |
          npm run build:mac -- --arm64 -p always > build_log.txt 2>&1 || (
            gh issue create --title "Build Failed on Mac" --body "$(tail -n 150 build_log.txt)"
            exit 1
          )
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false


